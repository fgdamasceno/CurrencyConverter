<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Currency Converter</title>
  </head>
  <body>
    <header>
      <h1>Currency Converter</h1>
    </header>

    <main>
      <section class="currency-cards-container">
        <div class="currency-main">
          <div class="currency-cards-main">
            <select
              class="currency-name currency-name-main"
              name="currency-name"
              id=""
            ></select>
            <div class="vertical-divider"></div>
            <input class="currency-input-main" type="number" value="1" />
          </div>
        </div>
        <div class="currency-others">
          <div class="currency-cards">
            <select
              class="currency-name currency-name-one"
              name="currency-name"
              id=""
            ></select>
            <div class="vertical-divider"></div>
            <input class="currency-input-one" type="number" />
          </div>
          <div class="currency-cards">
            <select
              class="currency-name currency-name-two"
              name="currency-name"
              id=""
            ></select>
            <div class="vertical-divider"></div>
            <input class="currency-input-two" type="number" />
          </div>
          <div class="currency-cards">
            <select
              class="currency-name currency-name-three"
              name="currency-name"
              id=""
            ></select>
            <div class="vertical-divider"></div>
            <input class="currency-input-three" type="number" />
          </div>
        </div>
      </section>
    </main>

    <footer>
      <!-- <a href="https://www.exchangerate-api.com">Rates By Exchange Rate API</a> -->
    </footer>

    <script src="./scritp.js"></script>
  </body>
</html>
